name: Deploy CloudGuard to EC2

"on":
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ~/cloudguard
            git pull origin main
            docker stop cloudguard-prod || true
            docker rm cloudguard-prod || true
            docker build -t cloudguard .
            docker run -d \
              --restart unless-stopped \
              --env-file .env \
              -p 5000:5000 \
              --name cloudguard-prod \
              cloudguard